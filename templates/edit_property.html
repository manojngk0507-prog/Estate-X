<!DOCTYPE html>
<!-- templates/edit_property.html – Admin form to edit an existing property -->
{% extends "base.html" %}
{% block title %}Edit Property{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Property</h1>
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-small">Back to Dashboard</a>
</div>

<form method="POST"
      action="{{ url_for('admin.edit_property', property_id=property.id) }}"
      enctype="multipart/form-data" style="max-width:600px;">

    <div class="form-group">
        <label for="title">Property Title: *</label>
        <input type="text" id="title" name="title" required value="{{ property.title }}">
    </div>

    <div class="form-group">
        <label for="location">Location: *</label>
        <input type="text" id="location" name="location" required value="{{ property.location }}">
    </div>

    <div class="form-group">
        <label for="price">Price (Rs): *</label>
        <input type="number" id="price" name="price" required min="0" value="{{ property.price }}">
    </div>

    <div class="form-group">
        <label for="bedrooms">Bedrooms: *</label>
        <input type="number" id="bedrooms" name="bedrooms" required min="0"
               value="{{ property.bedrooms }}">
    </div>

    <div class="form-group">
        <label for="bathrooms">Bathrooms: *</label>
        <input type="number" id="bathrooms" name="bathrooms" required min="0"
               value="{{ property.bathrooms }}">
    </div>

    <div class="form-group">
        <label for="area">Area (sq ft): *</label>
        <input type="number" id="area" name="area" required min="0" value="{{ property.area }}">
    </div>

    <div class="form-group">
        <label for="description">Description:</label>
        <textarea id="description" name="description">{{ property.description or '' }}</textarea>
    </div>

    <div class="form-group">
        <label>Current Image:</label>
        {% if property.image_path %}
            <img src="{{ url_for('uploaded_file', filename=property.image_path) }}"
                 alt="Current" style="width:200px;height:auto;display:block;
                 border:1px solid #aaa;margin-bottom:6px;">
        {% else %}
            <p style="color:#666;">No image uploaded.</p>
        {% endif %}
        <label for="image">Upload New Image (leave blank to keep current):</label>
        <input type="file" id="image" name="image" accept="image/*">
    </div>

    <div class="form-group">
        <button type="submit">Update Property</button>
        <a href="{{ url_for('admin.dashboard') }}" class="btn"
           style="margin-left:10px;background:#888;border-color:#888;">Cancel</a>
    </div>
</form>
{% endblock %}
